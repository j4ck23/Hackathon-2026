<!DOCTYPE html>
<html>
<head>
  <title>Group 1</title>


  <!-- Imports -->
  <!-- React:  UI library that automatically updates the page when data changes -->
  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <!-- ReactDOM:  part of React that connects to the browser's DO, to let us now the inputs happened  -->
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <!-- prop-types: required by Recharts, must be loaded before it -->
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <!-- Recharts: pinned to 2.1.16 which is stable with React 17 -->
  <script src="https://unpkg.com/recharts@2.1.16/umd/Recharts.js"></script>
  <!-- Babel: lets us write JSX (HTML-like syntax inside JS) without a build step -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body    { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #f8fafc; color: #1e293b; }
    button  { padding: 10px 24px; font-size: 16px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error  { color: red; }
    .seed-input { width: 80px; margin-right: 12px; padding: 8px; font-size: 16px; }
    .split-input { width: 80px; margin-right: 12px; padding: 8px; font-size: 16px; }
  </style>

</head>


<body>

  <!-- React mounts the entire app into this div, see below -->
  <div id="root"></div>

  <!-- type="text/babel" tells Babel to transform this script before the browser runs it -->
  <script type="text/babel">

    // Pull out the hooks and chart components we need from the loaded libraries
    const { useState, useEffect } = React;
    const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

    const ALL_FEATURES = [
      { key: "Area", label: "Area" },
      { key: "Year", label: "Year" },
      { key: "Crop", label: "Crop" },
      { key: "average_rain_fall_mm_per_year", label: "Rainfall" },
      { key: "avg_temp", label: "Temperature" },
      { key: "pesticide_amount", label: "Pesticide" },
    ];
    const MIN_SPLIT_YEAR = 1991;
    const MAX_SPLIT_YEAR = 2013; 

    function App() {

      // useState holds values that, when changed, cause React to re-render the page
      // Each returns [currentValue, functionToUpdateIt]
      const [results, setResults]         = useState([]);    // predictions vs actuals from the model
      const [importances, setImportances] = useState([]);    // feature importance scores
      const [loading, setLoading]         = useState(false); // true while waiting for the server
      const [error, setError]             = useState(null);  // holds an error message if fetch fails
      const [seed, setSeed]               = useState(42);    // random seed for data generation and model

      // metrics r2 / mse
      const [metrics, setMetrics]         = useState(null);  // holds model performance metrics
      const [splitYear, setSplitYear] = useState(2010);
      const [selectedFeatures, setSelectedFeatures] = useState(["Area", "Year", "Crop"]);


      const [status, setStatus]           = useState("");
      const [options, setOptions]         = useState([]);
  
      function toggleFeature(featureKey) {
        setSelectedFeatures(prev => {
          if (prev.includes(featureKey)) {
            return prev.filter(f => f !== featureKey);
          }
          return [...prev, featureKey];
        });
        setError(null);
      }

      useEffect(() => {
        fetch("/dropdown")
          .then(res => res.json())
          .then(data => setOptions(data));

          if (options.length > 0) {
            setStatus(options[0].value); // Set the default value to the first option
          }
      }, []);    
      // Global model year and features selected.
      // This function runs when the button is clicked
      // It calls the Flask /run route and stores the response in state
      async function runModelGlobal() {
        if (selectedFeatures.length === 0) {
          setError("Select at least one feature.");
          return;
        }
        if (splitYear < MIN_SPLIT_YEAR || splitYear > MAX_SPLIT_YEAR || isNaN(splitYear) || !Number.isInteger(Number(splitYear))) {
          setError(`Split year must be between ${MIN_SPLIT_YEAR} and ${MAX_SPLIT_YEAR}.`);
          return;
        }
        setLoading(true);  // disables the button while running
        setError(null);    // clear any previous error

        try {
          const featuresString = selectedFeatures.join(",");
          // const res  = await fetch(`/run?seed=${seed}`); // call the Flask backend, passing the seed 
          const res  = await fetch(`/runModelGlobal?seed=${seed}&split_year=${splitYear}&features=${featuresString}&status=${status}`);
          const data = await res.json();           // parse the JSON response
        
          setResults(data.results);                // store predictions vs actuals
          setImportances(data.importances);        // store feature importances
          setMetrics(data.metrics);                // store model performance metrics
        } catch (e) {
          setError("Failed to run model. Is the Flask server running?");
        } finally {
          setLoading(false); // re-enable the button whether it succeeded or failed
        }

      }

      // JSX this looks like HTML but is transformed by Babel into JavaScript (blah blah blah)
      // React re-renders this whenever there is a state change
      return (
        <div>
          <h1>Group 1 Hackathon Spring Week</h1>
          <h4>Choose the temporal split and the feature set, then run XGBoost on the full global dataset.</h4>
          <h4>Split semantics: train on years &lt; split year  test on years &gt;=  split year. <p>Years: 1990-2013 </p> </h4>
          {/* Number input — onChange updates the seed state as the user types */}
          <label>
            Seed: <input
              type="number"
              value={seed}
              onChange={e => setSeed(e.target.value)}
              className="seed-input"
            />
          </label>
          <label>
            Split Year: <input
              type="number"
              value={splitYear}
              min={MIN_SPLIT_YEAR}
              max={MAX_SPLIT_YEAR}
              onChange={e => setSplitYear(e.target.value)}
              className="split-input"
            />
          </label>

          <select value={status} onChange={e => setStatus(e.target.value)}>
            <option value="">Select a crop</option>
            {options.map(opt => (
              <option key={opt.value} value={opt.value}>
                {opt.label}
              </option>
            ))}
          </select>
           
          <h3>Select features</h3>

          <div className="feature-list">
            {ALL_FEATURES.map(feature => (
              <label key={feature.key} className="feature-item">
                <input
                  type="checkbox"
                  checked={selectedFeatures.includes(feature.key)}
                  onChange={() => toggleFeature(feature.key)}
                />
                {" "}{feature.label}
              </label>
            ))}
          </div>
            {/* onClick wires the button to runModel(); disabled prevents double-clicking */}
            <button onClick={runModelGlobal} disabled={loading}>
             {loading ? "Running..." : "Run Model"}
          </button>
 

          {/* Only renders the error message if error is not null */}
          {error && <p className="error">{error}</p>}

          {/* Only renders the charts once results have been loaded */}
          {results.length > 0 && (
            <div>

              <h2>Predictions vs Actuals</h2>
              {/* ResponsiveContainer makes the chart fill its parent width */}
              <ResponsiveContainer width="100%" height={300}>
                <LineChart data={results}>
                  <CartesianGrid strokeDasharray="3 3" />  {/* background grid */}
                  <XAxis dataKey="index" />                {/* x axis uses the "index" field */}
                  <YAxis />
                  <Tooltip />                              {/* shows values on hover */}
                  <Legend />                               {/* colour key */}
                  {/* dataKey matches the field names returned by Flask */}
                  <Line type="monotone" dataKey="actual"    stroke="#2563eb" dot={false} strokeWidth={2} />
                  <Line type="monotone" dataKey="predicted" stroke="#f97316" dot={false} strokeWidth={2} />
                </LineChart>
              </ResponsiveContainer>

              <h2>Feature Importances</h2>
              <ResponsiveContainer width="100%" height={240}>
                <BarChart data={importances}>
                  <CartesianGrid strokeDasharray="3 3" />
                  <XAxis dataKey="feature" />              {/* x axis uses the "feature" field */}
                  <YAxis />
                  <Tooltip />
                  <Bar dataKey="importance" fill="#2563eb" />
                </BarChart>
              </ResponsiveContainer>

            </div>
            
          )}
            {metrics && (
              <div>
                <h2>Model Performance Metrics</h2>
                <ul>
                  {Object.entries(metrics).map(([key, value]) => (
                    <li key={key}>{key}: {value}</li>
                  ))}
                </ul>
              </div>
            )}
        </div>
        
      );
    }

    // Mount the App component into the <div id="root"> above
    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
